name: Build X11 Restyled APK

on:
  push:
    branches: ["main"]
    paths:
      - "x11-restyled/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: x11-restyled
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :android-overlay:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: x11-restyled-apk
          path: x11-restyled/android-overlay/build/outputs/apk/debug/*.apk
